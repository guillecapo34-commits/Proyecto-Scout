<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShadowScout — Match Simulator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>

  <header class="app-header">
    <span class="app-logo">Shadow<em>Scout</em></span>
  </header>

  <div class="app-body">

    <nav class="app-nav">
      <a href="/" class="nav-item"><span class="nav-icon">⌂</span> Home</a>
      <a href="/teams.html" class="nav-item"><span class="nav-icon">#</span> Teams</a>
      <a href="/simulator.html" class="nav-item active"><span class="nav-icon">⚡</span> Match Simulator</a>
    </nav>

    <div class="app-content">

      <div class="sim-layout">
        <h2 class="sim-title">Match Simulator</h2>
        <p class="sim-sub">Select 4 teams to simulate a match and compare their stats.</p>

        <div class="sim-alliances">
          <div class="sim-alliance red">
            <div class="sim-alliance-header red-bg">Red Alliance</div>
            <div class="sim-team-slot" data-slot="red-1">
              <div class="sim-slot-row">
                <input type="text" placeholder="Team #" class="sim-input" />
                <button class="sim-add-btn">Add</button>
              </div>
            </div>
            <div class="sim-team-slot" data-slot="red-2">
              <div class="sim-slot-row">
                <input type="text" placeholder="Team #" class="sim-input" />
                <button class="sim-add-btn">Add</button>
              </div>
            </div>
          </div>

          <div class="sim-alliance blue">
            <div class="sim-alliance-header blue-bg">Blue Alliance</div>
            <div class="sim-team-slot" data-slot="blue-1">
              <div class="sim-slot-row">
                <input type="text" placeholder="Team #" class="sim-input" />
                <button class="sim-add-btn">Add</button>
              </div>
            </div>
            <div class="sim-team-slot" data-slot="blue-2">
              <div class="sim-slot-row">
                <input type="text" placeholder="Team #" class="sim-input" />
                <button class="sim-add-btn">Add</button>
              </div>
            </div>
          </div>
        </div>

        <button id="predict-btn" class="predict-btn" disabled>Predict match</button>

        <div id="prediction-section" class="prediction-section" style="display:none">
          <div class="pred-scores">
            <div class="pred-alliance red-bg">
              <div class="pred-label">Red Alliance</div>
              <div class="pred-score" id="pred-red-score">—</div>
              <div class="pred-prob" id="pred-red-prob">—</div>
            </div>
            <div class="pred-vs">vs</div>
            <div class="pred-alliance blue-bg">
              <div class="pred-label">Blue Alliance</div>
              <div class="pred-score" id="pred-blue-score">—</div>
              <div class="pred-prob" id="pred-blue-prob">—</div>
            </div>
          </div>
          <div class="pred-bar-wrap">
            <div class="pred-bar-red" id="pred-bar-red"></div>
          </div>
          <div class="pred-strategies">
            <p class="section-lbl">Suggested strategies</p>
            <ul id="pred-strategies"></ul>
          </div>
        </div>
      </div>

      <footer class="app-footer">
        <div class="footer-team">
          <span class="footer-logo">Shadow<em>Fox</em> #32753</span>
          <span class="footer-club">Andes Robotics Club</span>
