<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>FTC SCOUT - Team Search</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; padding: 2rem; max-width: 520px; margin: auto; }
        .row { display: flex; gap: 8px; margin-bottom: 8px; }
        .row input { flex: 1; padding: 8px 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; }
        .row button { padding: 8px 16px; border: 1px solid #ccc; border-radius: 8px; cursor: pointer; font-size: 14px; }
        .err { font-size: 13px; color: #c0392b; min-height: 18px; }
        .card { border: 1px solid #e0e0e0; border-radius: 12px; padding: 1rem 1.25rem; margin-top: 1rem; display: none; }
        .card .name { font-size: 17px; font-weight: 500; margin: 0 0 4px; }
        .card .sub { font-size: 13px; color: #666; margin: 0 0 12px; }
        table { width: 100%; font-size: 13px; border-collapse: collapse; }
        td { padding: 5px 0; border-top: 1px solid #f0f0f0; }
        td:last-child { text-align: right; }
        td:first-child { color: #888; }
        .spin {
            display: inline-block; width: 12px; height: 12px;
            border: 2px solid #ccc; border-top-color: #555;
            border-radius: 50%; animation: sp 0.7s linear infinite;
            vertical-align: middle; margin-right: 6px;
        }
        @keyframes sp { to { transform: rotate(360deg); } }
        .stats-grid {
            display: none;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 1rem;
        }
        .stat-card { background: #f7f7f5; border-radius: 8px; padding: 0.75rem 1rem; }
        .stat-card .lbl { font-size: 12px; color: #888; margin-bottom: 4px; }
        .stat-card .val { font-size: 22px; font-weight: 500; }
        .radar-wrap { display: none; margin-top: 1.5rem; }
        canvas#radar { max-width: 100%; }
    </style>
</head>
<body>

    <div class="row">
        <input type="text" id="tinput" placeholder="Team number (e.g. 6547)"
            onkeydown="if(event.key==='Enter') searchTeam()" />
        <button onclick="searchTeam()">Search</button>
    </div>
    <div class="err" id="err"></div>

    <div class="card" id="card">
        <p class="name" id="c-name"></p>
        <p class="sub" id="c-sub"></p>
        <table>
            <tr><td>Full name</td><td id="c-full"></td></tr>
            <tr><td>Country</td><td id="c-country"></td></tr>
            <tr><td>State / Province</td><td id="c-state"></td></tr>
            <tr><td>City</td><td id="c-city"></td></tr>
            <tr><td>Rookie Year</td><td id="c-rookie"></td></tr>
        </table>
    </div>

    <div class="stats-grid" id="stats-grid">
        <div class="stat-card"><div class="lbl">OPR</div><div class="val" id="s-opr">—</div></div>
        <div class="stat-card"><div class="lbl">Auto</div><div class="val" id="s-auto">—</div></div>
        <div class="stat-card"><div class="lbl">Teleop</div><div class="val" id="s-dc">—</div></div>
        <div class="stat-card"><div class="lbl">Endgame</div><div class="val" id="s-eg">—</div></div>
    </div>

    <div class="radar-wrap" id="radar-wrap">
        <canvas id="radar"></canvas>
    </div>

    <script>
        async function searchTeam() {
            const num = document.getElementById('tinput').value.trim();
            const err = document.getElementById('err');
            const card = document.getElementById('card');
            const statsGrid = document.getElementById('stats-grid');
            const radarWrap = document.getElementById('radar-wrap');
            err.textContent = '';
            card.style.display = 'none';
            statsGrid.style.display = 'none';
            radarWrap.style.display = 'none';

            if (!num || isNaN(num)) {
                err.textContent = 'Please enter a valid team number.';
                return;
            }

            err.innerHTML = '<span class="spin"></span>Searching...';

            try {
                const gqlRes = await fetch('https://api.ftcscout.org/graphql', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: '{ teamByNumber(number: ' + num + ') { number name schoolName rookieYear location { city state country } } }' })
                });
                if (!gqlRes.ok) throw new Error();
                const gql = await gqlRes.json();
                const t = gql.data.teamByNumber;
                if (!t) throw new Error();

                err.textContent = '';
                document.getElementById('c-name').textContent = `#${t.number} — ${t.name || `Team ${num}`}`;
                document.getElementById('c-sub').textContent = [t.location?.city, t.location?.state, t.location?.country].filter(Boolean).join(', ') || 'Location unknown';
                document.getElementById('c-full').textContent = t.schoolName || '—';
                document.getElementById('c-country').textContent = t.location?.country ?? '—';
                document.getElementById('c-state').textContent = t.location?.state ?? '—';
                document.getElementById('c-city').textContent = t.location?.city ?? '—';
                document.getElementById('c-rookie').textContent = t.rookieYear ?? '—';
                card.style.display = 'block';

                const statsRes = await fetch(`https://api.ftcscout.org/rest/v1/teams/${num}/quick-stats?season=2025`);
                if (statsRes.ok) {
                    const s = await statsRes.json();
                    document.getElementById('s-opr').textContent  = s.tot?.value  != null ? s.tot.value.toFixed(1)  : '—';
                    document.getElementById('s-auto').textContent = s.auto?.value != null ? s.auto.value.toFixed(1) : '—';
                    document.getElementById('s-dc').textContent   = s.dc?.value   != null ? s.dc.value.toFixed(1)   : '—';
                    document.getElementById('s-eg').textContent   = s.eg?.value   != null ? s.eg.value.toFixed(1)   : '—';
                    statsGrid.style.display = 'grid';

                    const TOTAL_TEAMS = 8000;
                    const autoRankVal = s.auto?.rank != null ? Math.round((1 - s.auto.rank / TOTAL_TEAMS) * 100) : 0;
                    const dcRankVal   = s.dc?.rank   != null ? Math.round((1 - s.dc.rank   / TOTAL_TEAMS) * 100) : 0;

                    if (window.radarChart) window.radarChart.destroy();
                    window.radarChart = new Chart(document.getElementById('radar'), {
                        type: 'radar',
                        data: {
                            labels: ['OPR', 'Auto', 'Teleop', 'Endgame', 'Auto Rank', 'Teleop Rank'],
                            datasets: [{
                                label: t.name || `Team ${num}`,
                                data: [
                                    s.tot?.value  ?? 0,
                                    s.auto?.value ?? 0,
                                    s.dc?.value   ?? 0,
                                    s.eg?.value   ?? 0,
                                    autoRankVal,
                                    dcRankVal
                                ],
                                borderColor: '#4a90d9',
                                backgroundColor: 'rgba(74,144,217,0.15)',
                                pointBackgroundColor: '#4a90d9',
                                borderWidth: 2,
                                pointRadius: 4
                            }]
                        },
                        options: {
                            responsive: true,
                            plugins: { legend: { display: false } },
                            scales: {
                                r: {
                                    beginAtZero: true,
                                    ticks: { display: false },
                                    grid: { color: 'rgba(0,0,0,0.08)' },
                                    angleLines: { color: 'rgba(0,0,0,0.08)' },
                                    pointLabels: { font: { size: 13 } }
                                }
                            }
                        }
                    });
                    radarWrap.style.display = 'block';
                }

            } catch(e) {
                err.textContent = 'Team not found. Check the number and try again.';
            }
        }
    </script>

</body>
</html>
